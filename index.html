<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Showroom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <span class="logo">PORTFOLIO.LAB</span>
            <div class="controls">
                <select id="langSwitcher" class="select-minimal">
                    <option value="es">ES</option>
                    <option value="en">EN</option>
                </select>
                <button id="themeToggle" class="btn-icon">🌙</button>
            </div>
        </div>
    </nav>

    <header class="hero container">
        <h1 data-i18n="title">Mi Showroom de Diseño</h1>
        <p data-i18n="subtitle">Explora prototipos interactivos y conceptos web modernos.</p>
    </header>

    <main class="container">
        <div class="grid">
            <!-- Card 1 -->
            <div class="card">
                <h3 data-i18n="card1_title">🏢 Landing Corporativa</h3>
                <p data-i18n="card1_desc">Diseño enfocado en conversión y seriedad profesional.</p>
                <a href="./prototipo-1/index.html" class="btn-primary" data-i18n="cta_btn">Ver Proyecto</a>
            </div>
            <!-- Card 2 -->
            <div class="card">
                <h3 data-i18n="card2_title">🛒 E-commerce Concept</h3>
                <p data-i18n="card2_desc">Propuesta visual minimalista para tiendas online.</p>
                <a href="./prototipo-2/index.html" class="btn-primary" data-i18n="cta_btn">Ver Proyecto</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

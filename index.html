<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Prototipos | Allien Martin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 40px; }
        header { text-align: center; margin-bottom: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; text-decoration: none; color: inherit; display: block; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: #007bff; }
        .card h2 { margin-top: 0; color: #007bff; }
        .card p { font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>Mis Prototipos Web</h1>
        <p>Selecciona un proyecto para ver la propuesta interactiva.</p>
    </header>

    <div class="grid">
        <!-- Ejemplo de Prototipo 1 -->
        <a href="./prototipo-empresa-x/index.html" class="card">
            <h2>🏢 Landing Corporativa</h2>
            <p>Diseño enfocado en conversión y seriedad profesional. Ideal para servicios B2B.</p>
        </a>

        <!-- Ejemplo de Prototipo 2 -->
        <a href="./prototipo-ecommerce/index.html" class="card">
            <h2>🛒 E-commerce Concept</h2>
            <p>Propuesta de tienda visual con enfoque en fotografía de producto y minimalismo.</p>
        </a>
    </div>
</body>
</html>

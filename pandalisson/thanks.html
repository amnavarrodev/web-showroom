<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje Enviado - Global Connect Argentina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: linear-gradient(160deg, #060e18 0%, #0a1f33 30%, #0f2d4a 60%, #0a1f33 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #ffffff;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 16px;
            max-width: 550px;
            width: 100%;
        }
        .icono {
            font-size: 70px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 1.05rem;
            line-height: 1.6;
        }
        .btn-volver {
            background: linear-gradient(135deg, #b8860b, #d4a745);
            color: #0a1f33;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            display: inline-block;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }
        .btn-volver:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(184, 134, 11, 0.45);
        }
        .info-adicional {
            margin-top: 25px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }
        .info-adicional a {
            color: #d4a745;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icono">✅</span>
        <h1>¡Mensaje Enviado con Éxito!</h1>
        <p>
            Gracias por contactarte con <strong>Global Connect Argentina</strong>.<br>
            Revisaremos tu consulta y te responderemos en menos de <strong>24 horas</strong>.
        </p>
        <a href="index.html" class="btn-volver">Volver al Inicio</a>
        <div class="info-adicional">
            <p>Si necesitás asistencia urgente, llamanos al <a href="tel:+541112345678">+54 11 1234-5678</a></p>
        </div>
    </div>
</body>
</html>
